n-delay:.25s}\n.stage-node:nth-child(7){animation-delay:.35s}\n.stage-node:nth-child(9){animation-delay:.45s}\n\n.stage-left { display:flex; align-items:center; gap:12px; padding:18px 18px; border-right:1px solid var(--border); }\n.stage-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }\n.stage-step { font-size:9px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin-bottom:3px; }\n.stage-name { font-size:13px; font-weight:700; }\n\n.stage-mid { padding:18px 22px; display:flex; flex-direction:column; justify-content:center; gap:7px; }\n.bar-track { height:24px; background:var(--soft); border-radius:3px; overflow:hidden; }\n.bar-fill {\n  height:100%; border-radius:3px; display:flex; align-items:center; padding-left:10px;\n  animation:growBar .85s ease both; transform-origin:left;\n}\n.bar-fill span { font-size:11px; font-weight:600; color:rgba(255,255,255,.9); white-space:nowrap; font-family:'Fira Code',monospace; }\n.bar-meta { display:flex; justify-content:space-between; font-size:10px; color:var(--muted); }\n\n.stage-right { padding:18px 18px; border-left:1px solid var(--border); display:flex; flex-direction:column; justify-content:center; align-items:flex-end; text-align:right; }\n.stage-vol { font-family:'Fira Code',monospace; font-size:17px; font-weight:500; color:var(--text); line-height:1; margin-bottom:3px; }\n.stage-sublabel { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; }\n\n/* ARROW ROWS */\n.arrow-row {\n  display:grid; grid-template-columns:200px 1fr 150px;\n  align-items:center; margin:6px 0; animation:fadeUp .4s both;\n}\n.arrow-row:nth-child(2){animation-delay:.10s}\n.arrow-row:nth-child(4){animation-delay:.20s}\n.arrow-row:nth-child(6){animation-delay:.30s}\n.arrow-row:nth-child(8){animation-delay:.40s}\n\n.arrow-left { display:flex; justify-content:center; align-items:center; font-size:18px; color:#d1d5db; }\n.arrow-mid { padding:5px 22px; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }\n.cvr-badge {\n  display:inline-flex; align-items:center; gap:8px;\n  background:var(--white); border:1.5px solid; border-radius:6px; padding:6px 12px;\n  font-size:11px; font-weight:600; white-space:nowrap;\n}\n.cvr-pct { font-family:'Fira Code',monospace; font-size:14px; font-weight:500; }\n.drop-chip { font-size:10px; font-weight:700; color:var(--red); background:#fef2f2; border:1px solid #fecaca; border-radius:4px; padding:3px 8px; font-family:'Fira Code',monospace; }\n.drop-reason { font-size:10px; color:var(--muted); font-style:italic; flex:1; }\n\n/* Colour per stage */\n.s1 .stage-dot,.s1 .bar-fill{background:var(--c1)} .s1 .stage-name{color:var(--c1)}\n.s1-a .cvr-badge{border-color:#bfdbfe;background:#eff6ff} .s1-a .cvr-pct{color:var(--c1)}\n\n.s2 .stage-dot,.s2 .bar-fill{background:var(--c2)} .s2 .stage-name{color:var(--c2)}\n.s2-a .cvr-badge{border-color:#a5f3fc;background:#ecfeff} .s2-a .cvr-pct{color:var(--c2)}\n\n.s3 .stage-dot,.s3 .bar-fill{background:var(--c3)} .s3 .stage-name{color:var(--c3)}\n.s3-a .cvr-badge{border-color:#ddd6fe;background:#f5f3ff} .s3-a .cvr-pct{color:var(--c3)}\n\n.s4 .stage-dot,.s4 .bar-fill{background:var(--c4)} .s4 .stage-name{color:var(--c4)}\n.s4-a .cvr-badge{border-color:#fed7aa;background:#fff7ed} .s4-a .cvr-pct{color:var(--c4)}\n\n.s5 .stage-dot,.s5 .bar-fill{background:var(--c5)} .s5 .stage-name{color:var(--c5)} .s5 .stage-vol{color:var(--c5)}\n\n/* BOTTOM TABLES */\n.two-col { display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-bottom:20px; }\n.card { background:var(--white); border:1.5px solid var(--border); border-radius:8px; padding:22px; box-shadow:0 1px 3px rgba(0,0,0,.04); animation:fadeUp .4s both; }\n.card-title { font-size:11px; font-weight:700; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; margin-bottom:16px; display:flex; align-items:center; gap:8px; }\n.card-title::after { content:''; flex:1; height:1px; background:var(--border); }\n.data-table { width:100%; border-collapse:collapse; font-size:12px; }\n.data-table th { text-align:left; font-size:9px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); padding:0 10px 10px 0; border-bottom:1px solid var(--border); }\n.data-table td { padding:9px 10px 9px 0; border-bottom:1px solid #f0f2f6; vertical-align:middle; }\n.data-table tr:last-child td{border-bottom:none}\n.data-table tr:hover td{background:#fafbfc}\n.dot{display:inline-block;width:7px;height:7px;border-radius:2px;margin-right:6px;vertical-align:middle}\n.fcode{font-family:'Fira Code',monospace;font-weight:500}\n.c-blue{color:var(--c1)}.c-teal{color:var(--c2)}.c-purple{color:var(--c3)}.c-orange{color:var(--c4)}.c-green{color:var(--c5)}.c-red{color:var(--red)}.c-amber{color:var(--amber)}\n\n.source-note { font-size:10px; color:var(--muted); background:var(--soft); border:1px solid var(--border); border-radius:6px; padding:11px 15px; line-height:1.7; }\n.source-note strong{color:var(--text)}\n\n@keyframes growBar{from{transform:scaleX(0)}to{transform:scaleX(1)}}\n@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}\n</style>\n</head>\n<body>\n<div class=\"page\">\n\n  <!-- HEADER -->\n  <div class=\"header\">\n    <div>\n      <h1>HP - <span>Digital Funnel</span> (ecommerce)</h1>\n      <p>Visits \u2192 PPV Visits \u2192 CABN Visits \u2192 Order Summary \u2192 Payment &nbsp;|&nbsp; Total Traffic: 7.56 Mn \u00b7 Orders: 78K</p>\n    </div>\n  </div>\n\n  <!-- 4 KPI CARDS -->\n  <div class=\"section-label\">Funnel Conversion Rates</div>\n  <div class=\"kpi-row\">\n    <div class=\"kpi-card\">\n      <div class=\"kpi-transition\">Visits \u2192 PPV Visits</div>\n      <div class=\"kpi-pct\">13.00%</div>\n      <div class=\"kpi-drop\">\u2193 87% Drop</div>\n      <div class=\"kpi-sub\">~982K of 7.56Mn visits land on a Product Page</div>\n    </div>\n    <div class=\"kpi-card\">\n      <div class=\"kpi-transition\">PPV Visits \u2192 CABN Visits</div>\n      <div class=\"kpi-pct\">6.90%</div>\n      <div class=\"kpi-drop\">\u2193 93% Drop</div>\n      <div class=\"kpi-sub\">~67.8K PPV sessions add to cart or hit Buy Now</div>\n    </div>\n    <div class=\"kpi-card\">\n      <div class=\"kpi-transition\">CABN Visits \u2192 Order Summary</div>\n      <div class=\"kpi-pct\">7.50%</div>\n      <div class=\"kpi-drop\">\u2193 93% Drop</div>\n      <div class=\"kpi-sub\">~5.1K CABN sessions reach the Order Summary page</div>\n    </div>\n    <div class=\"kpi-card\">\n      <div class=\"kpi-transition\">Summary \u2192 Payment</div>\n      <div class=\"kpi-pct\">42.00%</div>\n      <div class=\"kpi-drop\">\u2193 58% Drop</div>\n      <div class=\"kpi-sub\">Best-performing stage \u2014 payment completion drives 78K orders</div>\n    </div>\n  </div>\n\n  <!-- FUNNEL VISUAL -->\n  <div class=\"section-label\">Funnel Flow \u2014 Base: 7.56 Mn Visits \u00b7 78K Orders</div>\n  <div class=\"funnel-wrap\">\n\n    <!-- S1: Visits -->\n    <div class=\"stage-node s1\">\n      <div class=\"stage-left\">\n        <div class=\"stage-dot\"></div>\n        <div>\n          <div class=\"stage-step\">Stage 1</div>\n          <div class=\"stage-name\">Visits</div>\n        </div>\n      </div>\n      <div class=\"stage-mid\">\n        <div class=\"bar-track\">\n          <div class=\"bar-fill\" style=\"width:100%;animation-delay:.05s\"><span>7,560,000</span></div>\n        </div>\n        <div class=\"bar-meta\"><span>All traffic \u2014 Search, Browse, Ads, Brand Store, Direct</span><span>100%</span></div>\n      </div>\n      <div class=\"stage-right\">\n        <div class=\"stage-vol\">7.56 Mn</div>\n        <div class=\"stage-sublabel\">Total Visits</div>\n      </div>\n    </div>\n\n    <!-- Arrow 1 -->\n    <div class=\"arrow-row s1-a\">\n      <div class=\"arrow-left\">\u2193</div>\n      <div class=\"arrow-mid\">\n        <div class=\"cvr-badge\"><span>Visits \u2192 PPV Visits</span><span class=\"cvr-pct\">13.00%</span></div>\n        <span class=\"drop-chip\">\u221287% exit</span>\n        <span class=\"drop-reason\">Most visitors browse without clicking into a product \u2014 improve search rank, listing images &amp; ad targeting</span>\n      </div>\n    </div>\n\n    <!-- S2: PPV -->\n    <div class=\"stage-node s2\">\n      <div class=\"stage-left\">\n        <div class=\"stage-dot\"></div>\n        <div>\n          <div class=\"stage-step\">Stage 2</div>\n          <div class=\"stage-name\">PPV Visits</div>\n        </div>\n      </div>\n      <div class=\"stage-mid\">\n        <div class=\"bar-track\">\n          <div class=\"bar-fill\" style=\"width:13%;animation-delay:.15s\"><span>982,800</span></div>\n        </div>\n        <div class=\"bar-meta\"><span>Product Page Views \u2014 spec read, image review, price &amp; EMI check</span><span>13.00% of Visits</span></div>\n      </div>\n      <div class=\"stage-right\">\n        <div class=\"stage-vol\">9.83 L</div>\n        <div class=\"stage-sublabel\">PPV Visits</div>\n      </div>\n    </div>\n\n    <!-- Arrow 2 -->\n    <div class=\"arrow-row s2-a\">\n      <div class=\"arrow-left\">\u2193</div>\n      <div class=\"arrow-mid\">\n        <div class=\"cvr-badge\"><span>PPV \u2192 CABN Visits</span><span class=\"cvr-pct\">6.90%</span></div>\n        <span class=\"drop-chip\">\u221293% exit</span>\n        <span class=\"drop-reason\">Price sensitivity, competitor comparison, unclear EMI / bank offers on PDP \u2014 biggest leakage stage</span>\n      </div>\n    </div>\n\n    <!-- S3: CABN -->\n    <div class=\"stage-node s3\">\n      <div class=\"stage-left\">\n        <div class=\"stage-dot\"></div>\n        <div>\n          <div class=\"stage-step\">Stage 3</div>\n          <div class=\"stage-name\">CABN Visits</div>\n        </div>\n      </div>\n      <div class=\"stage-mid\">\n        <div class=\"bar-track\">\n          <div class=\"bar-fill\" style=\"width:0.897%;
