<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HP Analytics Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f3f4f6;
}
.sidebar{
  width:260px;
  height:100vh;
  position:fixed;
  left:0;
  top:0;
  background:white;
  padding:20px;
  box-shadow:0 0 20px rgba(0,0,0,0.1);
  overflow-y:auto;
}
.main{
  margin-left:280px;
  padding:25px;
  height:100vh;
  overflow-y:auto;
}
.menu-btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  margin-bottom:12px;
  cursor:pointer;
  font-weight:bold;
  background:#eef2ff;
}
.menu-btn.active{
  background:linear-gradient(to right,#2563eb,#7c3aed);
  color:white;
}
.page{
  display:none;
}
.page.active{
  display:block;
}
.card{
  background:white;
  border-radius:24px;
  padding:24px;
  box-shadow:0 4px 20px rgba(0,0,0,0.08);
}
.kpi-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:18px;
  margin-bottom:24px;
}
table{
  width:100%;
  border-collapse:collapse;
}
th,td{
  padding:14px;
  text-align:left;
  border-bottom:1px solid #e5e7eb;
}
</style>
</head>

<body>

<div class="sidebar">

<h1 style="font-size:28px;font-weight:bold;margin-bottom:30px;">
HP Analytics
</h1>

<button class="menu-btn active" onclick="showPage('page1',this)">
HP E-commerce Dashboard
</button>

<button class="menu-btn" onclick="showPage('page2',this)">
Flipkart Performance Dashboard
</button>

</div>

<div class="main">

<div id="page1" class="page active">

<h1 style="font-size:42px;font-weight:bold;">
HP E-commerce Dashboard
</h1>

<div class="kpi-grid">

<div class="card">
<p>Revenue</p>
<h2>$579M</h2>
</div>

<div class="card">
<p>Units Sold</p>
<h2>751K</h2>
</div>

<div class="card">
<p>CTR</p>
<h2>5.07%</h2>
</div>

</div>

<div class="card">

<h2>Country-wise Performance</h2>

<table>

<thead>
<tr>
<th>Country</th>
<th>Visits</th>
<th>Revenue</th>
</tr>
</thead>

<tbody>

<tr>
<td>United States</td>
<td>13.66 Mn</td>
<td>$196.8M</td>
</tr>

<tr>
<td>India</td>
<td>4.17 Mn</td>
<td>$40.7M</td>
</tr>

</tbody>

</table>

</div>

</div>

<div id="page2" class="page">

<h1 style="font-size:42px;font-weight:bold;">
Flipkart Performance Dashboard
</h1>

<div class="kpi-grid">

<div class="card">
<p>Revenue</p>
<h2>₹75.7 Cr</h2>
</div>

<div class="card">
<p>Units Sold</p>
<h2>84.42K</h2>
</div>

<div class="card">
<p>CVR</p>
<h2>0.65%</h2>
</div>

</div>

</div>

</div>

<script>

function showPage(pageId, btn){

document.querySelectorAll('.page').forEach(p=>{
p.classList.remove('active');
});

document.querySelectorAll('.menu-btn').forEach(b=>{
b.classList.remove('active');
});

document.getElementById(pageId).classList.add('active');
btn.classList.add('active');

}

</script>

</body>
</html>
